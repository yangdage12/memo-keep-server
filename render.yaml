services:
  - type: web
    name: memo-keep-backend
    env: node
    plan: free
    buildCommand: cd server && pnpm install && pnpm build
    startCommand: cd server && NODE_ENV=production node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: COZE_SUPABASE_URL
        sync: false
      - key: COZE_SUPABASE_ANON_KEY
        sync: false
      - key: COZE_SUPABASE_SERVICE_ROLE_KEY
        sync: false
